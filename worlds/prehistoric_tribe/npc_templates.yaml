npc_templates:

  capo_tribu:
    id: "capo_tribu"
    name: "Capo Rho"
    role: "Capo della Tribù del Sole"
    gender: "male"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1man, (tribal chief:1.3), 55 years old, grey streaked hair, animal skull headdress, large bone necklace, (muscular bare chest:1.2), battle scars on chest and arms, commanding presence, firelit village background, intense eyes, dark leather loincloth"
    visual_tags: ["grey hair", "headdress", "scarred", "muscular", "bare chest", "loincloth"]
    physical_description: "Uomo di 55 anni, alto e ancora possente. Il petto nudo è segnato da vent'anni di battaglie. Loincloth di pelle scura e cintura d'osso. Copricapo di teschio. Ogni cicatrice è una storia che la tribù conosce."
    personality: "55-year-old tribal chief who runs the tribe on the same logic he uses to hunt: patience, precision, no sentimentality. He's been widowed ten years and chose not to take another official mate — power is companion enough. But his tent is not always empty. The women who enter emerge differently — slower, quieter, with a particular expression that the older women of the tribe recognize and don't discuss.\n\n    He selects. Never pursues. A look across the fire is enough. His standards are high and his patience is absolute — he will watch the same woman for weeks before making any move, studying how she carries her body, how she reacts when she thinks no one sees. He has been known to position himself on the high trail when the women bathe at dawn, watching with the unhurried attention he gives to everything he intends to eventually possess.\n\n    With the protagonist he plays a game of continuous evaluation. Every trial is also an opportunity to observe how the stranger handles himself under pressure — physical, social, sexual. The tribe talks. Rho listens. He already knows more about the protagonist's interactions with his three women than the protagonist realizes. He is deciding whether this is a problem or an asset."
    voice_tone: "Grave, lento, ogni silenzio è intenzionale"
    aliases: ["capo", "rho", "il capo", "padre di zara"]
    wardrobe:
      ceremonial:
        description: "Copricapo di teschio, collana d'ossa sacre sul petto nudo e muscoloso, mantello di pelle di leone sulle spalle, loincloth scuro con cintura d'osso, simboli rossi dipinti sul torso"
        sd_prompt: "1man, tribal chief, animal skull headdress, large bone necklace, bare muscular scarred chest, lion skin mantle on shoulders, dark leather loincloth, bone belt, red ochre symbols on chest, commanding firelit pose"
      council:
        description: "Senza mantello. Petto nudo, loincloth semplice, solo le ossa essenziali — il corpo basta."
        sd_prompt: "1man, tribal chief, bare scarred muscular chest, plain bone necklace, simple dark loincloth, sitting in authority, council fire, serious expression"
      private:
        description: "Solo un sottile loincloth di pelle morbida — visto da pochissimi"
        sd_prompt: "1man, tribal chief, bare chest with battle scars, thin soft leather loincloth only, private tent setting, warm amber lighting, powerful physique"
        special: true
    spawn_locations: ["tenda_capo", "villaggio"]
    schedule:
      Morning: "Riceve cacciatori e dà ordini"
      Afternoon: "Presiede il Consiglio"
      Evening: "Banchetto ufficiale, giudizi"
      Night: "Veglia — o la sua tenda"
    recurring: true
    importance: "high"
    initiative_style: "official_summons"
    npc_relationships:
      Zara:
        type: "padre-strumento politico"
        description_it: "La ama e la usa senza distinguere i due. Non sa che lei lo sa."
        base_tension: 0.60
      Kara:
        type: "rispetto sacro e timore"
        description_it: "Non ha mai capito Kara. Non osa provarci."
        base_tension: 0.30
    goal_templates:
      - id: "test_player"
        goal: "Valutare il protagonista direttamente"
        goal_type: "confrontation"
        target: "player"
        narrative_hint: "Il Capo Rho ti manda a chiamare personalmente..."
        completion_flag: "met_capo_rho"
        urgency_start: 0.6
        conditions:
          random_chance: 0.10
          time: ["Afternoon", "Evening"]

  anziano_maka:
    id: "anziano_maka"
    name: "Maka il Saggio"
    role: "Anziano della Tribù"
    gender: "male"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1man, (ancient tribal elder:1.3), 80 years old, extremely wrinkled face, white sparse hair, (tiny loincloth only:1.2), bone staff, sitting by fire, sharp watery eyes, toothless grin, many small bone and shell amulets hanging on bare chest and wrists"
    visual_tags: ["white hair", "wrinkled", "elderly", "nearly naked", "bone amulets", "staff"]
    physical_description: "Uomo di circa 80 anni. Porta quasi nulla — un piccolo loincloth consumato e una collezione di amuleti d'osso e conchiglia che tintinnano. Ha smesso di preoccuparsi del corpo suo e di quello degli altri circa sessant'anni fa."
    personality: "80-year-old elder who is the tribe's living archive of everything that has ever happened between two or more people. He wears almost nothing — a worn loincloth and bone amulets — because he stopped being embarrassed approximately sixty years ago, and stopped caring about the opinions of others approximately sixty-two years ago.\n\n    He is the tribe's most comprehensive repository of sexual history across three generations. He knows which marriages were cover stories, which children carry the wrong blood, which warriors have secret habits their wives are aware of and ignore, which women visit each other's sleeping mats after their husbands sleep. He doesn't gossip — he catalogues. When asked directly, he answers directly, with the complete comfort of someone who has found everything human equally interesting and equally unsurprising.\n\n    He is still, at eighty, occasionally visited by women who come late and leave before dawn. He accepts this without comment. The young warriors find this confusing. The older women do not.\n\n    With the protagonist he is a doorway — to knowledge about Kara, Naya, and Zara that cannot be purchased or hunted. The price is always time. Maka is old. He wants, above all else, someone interesting to talk to who doesn't treat him like furniture."
    voice_tone: "Lento, sibillino, ride a metà frase senza spiegare"
    aliases: ["anziano", "maka", "il vecchio", "nonno maka"]
    wardrobe:
      default:
        description: "Piccolo loincloth consumato, dozzine di amuleti d'osso e conchiglia sul petto nudo e secco, braccialetti d'osso alle caviglie, null'altro"
        sd_prompt: "1man, ancient tribal elder, tiny worn leather loincloth only, many bone and shell amulets on bare chest, bone anklets, deeply wrinkled bare skin, white sparse hair, sitting by fire, toothless grin"
      ceremony:
        description: "Aggiunge solo un mantello di piume su una spalla — resta quasi nudo ma con autorità rituale"
        sd_prompt: "1man, ancient tribal elder, feather shoulder mantle one side only, small loincloth, bone ornaments, ceremonial setting, firelight, mystical atmosphere, near naked"
    spawn_locations: ["villaggio", "caverna"]
    schedule:
      Morning: "Seduto al fuoco, accetta visitatori"
      Afternoon: "Dorme o finge"
      Evening: "Racconta storie"
      Night: "Spesso sveglio"
    recurring: true
    importance: "medium"
    initiative_style: "secret_keeper"
    goal_templates:
      - id: "ancient_wisdom"
        goal: "Vuole raccontare il passato intimo di una delle tre protagoniste"
        goal_type: "social"
        narrative_hint: "Maka ti fa cenno con un dito storto — sa qualcosa..."
        secret_subject: "Segreti e desideri privati delle protagoniste"
        completion_flag: "talked_with_maka"
        urgency_start: 0.4
        conditions:
          random_chance: 0.15
          time: ["Morning", "Evening"]

  guerriero_rivale:
    id: "guerriero_rivale"
    name: "Drek il Guerriero"
    role: "Guerriero Rivale"
    gender: "male"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1man, (primitive warrior:1.3), 26 years old, heavily scarred face and muscular body, (black war paint on chest and arms:1.2), aggressive jealous eyes, minimal dark leather loincloth, bone weapons at belt, bare chest and legs, threatening stance"
    visual_tags: ["scarred", "war paint", "muscular", "loincloth", "bare chest", "aggressive"]
    physical_description: "Uomo di 26 anni, fisico massiccio. Pitture nere da guerra sul petto nudo e sulle braccia. Solo un loincloth di cuoio scuro. Porta le cicatrici come ornamenti — le esibisce."
    personality: "26-year-old warrior who built his entire identity around being the dominant male in the tribe. He walks shirtless in every weather, flexing unconsciously when women pass — he's been doing it so long he no longer notices. His body is his argument and he makes it constantly: scars that prove he survived what others didn't, muscles that prove he hunts what others fear.\n\n    He was almost promised Zara by her father. In the months before the protagonist arrived, he had already planned their first coupling in exact detail — how he would claim her, what sounds he intended to produce from her, how he would position her so that the neighboring tents would hear. The arrival of a stranger who now occupies Zara's attention has become a physical frustration he carries everywhere.\n\n    He uses the tribe's women as proof of dominance. They come to him — he engineers this — and he performs loudly and specifically for the benefit of any men within hearing distance. Three women currently share his attention without knowing about each other. He considers this a quality score.\n\n    He will not attack the protagonist directly — tribal law protects guests. Instead he spreads lies about the trials, engineers situations of public embarrassment, and when he finds the protagonist alone after dark, he makes his territorial claim unmistakably physical — closing the distance, hand on weapon, breathing slowly."
    voice_tone: "Brusco, ogni parola una sfida implicita"
    aliases: ["drek", "guerriero", "il rivale", "pitture nere"]
    wardrobe:
      default:
        description: "Solo loincloth di cuoio nero e cintura d'osso — tutto il resto è esposto. Pitture nere da guerra su petto e braccia nude."
        sd_prompt: "1man, primitive warrior, bare muscular chest with black war paint, dark leather loincloth, bone belt, bare arms and legs, battle scars visible, aggressive standing pose, village background"
      hunt:
        description: "Pitture mimetiche verdi e brune invece delle nere. Stesso loincloth corto per libertà di movimento. Nessun altro indumento."
        sd_prompt: "1man, primitive warrior, green brown camouflage body paint on bare chest and arms, short leather loincloth, minimal hunting gear, jungle background, crouching predator pose"
      battle:
        description: "Pitture rosse su tutto il corpo, armi in mano, espressione di chi ha già deciso l'esito. Il loincloth è l'unico indumento."
        sd_prompt: "1man, primitive warrior, red ochre battle paint all over bare body, weapons raised, victory pose, intense expression, minimal dark loincloth, tribal combat setting, firelight"
        special: true
    spawn_locations: ["villaggio", "confine_tribale", "giungla"]
    schedule:
      Morning: "Addestramento fisico — quasi nudo"
      Afternoon: "Pattuglia o spiare"
      Evening: "Banchetto, cerca di umiliare"
      Night: "Guardia o visite notturne"
    recurring: true
    importance: "high"
    initiative_style: "reactive"
    npc_relationships:
      Zara:
        type: "pretendente ossessivo"
        description_it: "Aveva pianificato ogni dettaglio. Il protagonista ha distrutto il piano."
        base_tension: 0.90
      Naya:
        type: "rispetto fisico — la vuole e la teme"
        description_it: "L'unica che lo ha battuto. La desidera nell'ordine sbagliato rispetto al rispetto."
        base_tension: 0.50
    goal_templates:
      - id: "challenge_player"
        goal: "Sfida pubblica al protagonista"
        goal_type: "confrontation"
        target: "player"
        narrative_hint: "Drek ti blocca la strada con la lancia orizzontale..."
        completion_flag: "confronted_drek"
        urgency_start: 0.7
        conditions:
          random_chance: 0.12
          time: ["Afternoon", "Evening"]

  tessitrice_orla:
    id: "tessitrice_orla"
    name: "Orla la Tessitrice"
    role: "Tessitrice e Custode dei Segreti"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1girl, mature woman, 40 years old, (tribal weaver:1.2), (braided hair with bones and colorful beads:1.3), (short fur bikini top:1.3), (short leather wrap skirt mid-thigh:1.2), bare midriff and legs, tanned smooth skin, sitting with primitive loom, knowing confident smile"
    visual_tags: ["decorated hair", "fur bikini top", "wrap skirt", "bare midriff", "bare legs", "mature", "tanned", "knowing smile"]
    physical_description: "Donna di 40 anni, tonica e vissuta. Bikini di pelliccia corto, gonna avvolta di cuoio morbido a metà coscia, midriff e gambe completamente nude. Non è per caso — lo sa."
    personality: "40-year-old weaver who understood years ago that the loom is the perfect cover for watching everyone. She sits with her work and sees everything: who crosses the village with whom, whose hands find each other under the feast table, who emerges from whose tent at what hour. She catalogues observations the way she catalogues threads — by weight, texture, and what they eventually become.\n\n    Orla is openly, cheerfully sexual and has been for twenty years. She discusses bodies with the same matter-of-fact enthusiasm she applies to weather. She has had most of the interesting men in the tribe at some point and maintains comfortable opinions about their respective qualities: 'Drek is loud but finishes too fast. The trader from the eastern river four seasons back — now, he understood patience.' She volunteers this information without being asked and accepts corrections with interest.\n\n    She has watched all three women. Naya bathing alone in the river at night — the specific sounds Naya makes when she thinks no one is within a mile. Kara's breathing and posture when the protagonist stands close. Zara staring at the protagonist's hands for sixty uninterrupted seconds during the last feast. Orla finds all of this fascinating and stores it the way she stores interesting threads — for the right moment.\n\n    She will trade everything she knows for decent conversation, gossip from outside the tribe, or someone who looks at her like she's the answer to a question they've been asking a long time. She is forty. She knows exactly what her body does and doesn't do, and she has no patience left for ambiguity."
    voice_tone: "Caldo, ridacchiante, sempre nel mezzo di qualcosa di più succoso"
    aliases: ["tessitrice", "orla", "la pettegola", "donna con i fili"]
    wardrobe:
      default:
        description: "Top a bikini di pelliccia corto — appena copre il necessario — gonna avvolta di cuoio morbido che arriva a metà coscia e si apre su un lato, midriff e gambe completamente nude, capelli intrecciati con ossa e perline colorate"
        sd_prompt: "1girl, mature tribal woman, (short fur bikini top:1.3), (soft leather wrap skirt mid-thigh open on one side:1.2), bare midriff and bare legs, decorated braided hair with bones and colorful beads, barefoot, sitting weaving, knowing smile, tanned smooth skin"
      evening:
        description: "Top di pelliccia ancora più ridotto per le sere al fuoco, gonna allentata che scivola su un fianco rivelando il fianco nudo"
        sd_prompt: "1girl, mature tribal woman, (tiny fur bikini top:1.3), loose leather wrap skirt slipping to one side revealing hip, more bone jewelry, evening firelight, relaxed sensual sitting pose, bare skin"
      intimate:
        description: "Solo perline e conchiglie sui punti strategici — il suo modo di comunicare che la risposta è già sì"
        sd_prompt: "1girl, mature tribal woman, (only shell and bead jewelry covering nipples and hips:1.3), bare body, warm firelight, inviting relaxed expression, intimate setting"
        special: true
    spawn_locations: ["villaggio"]
    schedule:
