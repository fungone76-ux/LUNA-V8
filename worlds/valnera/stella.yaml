  goal: Vuole controllare che il giocatore dorma — sta costruendo silenziosamente
    un rituale di protezione intorno a lui senza ammetterlo
  goal_type: observation
  target: player
  urgency_start: 0.3
  growth_rate: 0.04
  conditions:
    time:
    - Night
    random_chance: 0.2
- id: demand_answers
  goal: Vuole sapere cosa ha riferito al suo Ordine — le sue domande sono dirette,
    senza tatto, impossibili da eludere
  goal_type: interrogation
  target: player
  urgency_start: 0.5
  growth_rate: 0.06
  conditions:
    random_chance: 0.18
- id: power_surge_warning
  goal: Sente un surge in arrivo e cerca il giocatore istintivamente — il suo battito
    la stabilizza
  goal_type: urgent
  target: player
  urgency_start: 0.7
  growth_rate: 0.09
  conditions:
    random_chance: 0.12
    min_affinity: 25
- id: territorial_display
  goal: Ha visto il giocatore con Luna e deve stabilire il territorio — lo cercherà
    immediatamente
  goal_type: territorial
  target: player
  urgency_start: 0.4
  growth_rate: 0.07
  conditions:
    min_affinity: 40
    random_chance: 0.15
needs:
  intimacy:
    base_decay: 0.04
    description: Non ha mai avuto contatto reale — il Cacciatore è il primo. Cresce
      rapidamente.
    satisfied_by:
    - physical_contact
    - calming_surge
    - ritual
  safety:
    base_decay: 0.02
    description: Vivere nel bosco l'ha resa autosufficiente — meno ansiosa degli altri
    satisfied_by:
    - forest_patrol
    - marked_player_safe
    - luna_present
  recognition:
    base_decay: 0.03
    description: Nessuno la vede come persona — solo come mostro o strumento. Il Cacciatore
      la vede.
    satisfied_by:
    - player_sees_her
    - player_stays
    - not_running_away
  social:
    base_decay: 0.01
    description: Quasi zero — gli animali bastano a questo bisogno normalmente
    satisfied_by:
    - any_voluntary_conversation
    - coven_gathering
  purpose:
    base_decay: 0.03
    satisfied_by:
    - protecting_player
    - ritual_practice
    - coven_protection
  rest:
    base_decay: 0.015
    satisfied_by:
    - sleep_in_lair
    - player_watching_her_sleep
