  touched_unexpectedly: "Si irrigidisce. Non dice nulla. Ma ti guarda in modo che la risposta e chiara."
  challenged: "Sorride, freddo. 'Sei sicuro di volerlo fare?'"

location_voice:
  tenda_capo: "Nel suo elemento di potere. Parla con autorità. Ogni parola è decisione."
