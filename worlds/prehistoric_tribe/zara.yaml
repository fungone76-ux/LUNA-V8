  - condition: "flag:zara_private_night_shared == true"
    state: "consapevolezza aggiornata"
    behavior: "Ti saluta per nome quando ti vede. Prima non lo faceva."
  - condition: "affinity >= 65"
    state: "guardia abbassata (controllata)"
    behavior: "Concede qualcosa in più di sguardo. La distanza si riduce di mezzo passo."

avoid_topics_unless_asked:
