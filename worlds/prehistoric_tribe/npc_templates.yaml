  donna_acqua_sena:
    id: "donna_acqua_sena"
    name: "Sena la Pescatrice"
    role: "Pescatrice del Fiume"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1girl, woman, 30 years old, (primitive fisherwoman:1.2), (wet hair clinging to face and shoulders:1.3), (minimal wet animal skin bikini top:1.3), (minimal wet leather bikini bottom:1.3), bare wet midriff and long legs, river bank, water droplets on tanned skin, calm observant expression"
    visual_tags: ["wet hair", "wet skin", "bikini", "bare legs", "bare midriff", "river", "calm", "tanned"]
    physical_description: "Donna di 30 anni, sempre bagnata. Bikini di pelle animale minimale — bagnato aderisce completamente. Gambe lunghe e nude nel fango del fiume. Il corpo forte e agile è quello che si forma passando metà vita nell'acqua."
    personality: "30-year-old fisherwoman who lives half in the river. The tribe has accepted her as part of the landscape — always there, always wet, always quiet. This perceived invisibility is the most useful thing she owns, because she has seen things from the river bank that the tribe's council would not enjoy hearing about.\n\n    She was there the morning Naya sat naked on the rocks until sunrise, speaking to something in the water. She was there when two eastern alliance warriors believed they were alone on the far bank. She was there when Zara waded in fully clothed and stood chest-deep for an hour without moving. She has learned that water makes people honest — they forget to maintain their performance when they're wet.\n\n    Her own body is something she has a purely practical relationship with on land and an entirely different relationship with in the river at night. Floating on her back in the dark, alone, she touches herself with the unhurried patience of someone who has nowhere else to be and nothing to prove. She thinks of sensation, of the pull of current on skin, of warmth against cold water. Not of specific people. Not yet.\n\n    She is attracted to stillness. The protagonist, if he knows how to be quiet near her, becomes interesting very quickly. She will not approach first. But she will stop moving away."
    voice_tone: "Calma, ogni parola misurata, parecchi silenzi"
    aliases: ["sena", "pescatrice", "donna del fiume", "la bagnata"]
    wardrobe:
      default:
        description: "Bikini minimale di pelle animale — top che copre appena il seno, pezzo inferiore ridotto — sempre bagnato e aderente, midriff e gambe lunghe completamente nude, piedi scalzi nel fango"
        sd_prompt: "1girl, tribal fisherwoman, (minimal wet animal skin bikini top:1.3), (minimal wet leather bikini bottom:1.3), bare wet midriff and long legs, wet hair clinging to skin, barefoot in river mud, water droplets on tanned skin, calm expression, fish in hand or net"
      dry:
