    completion_flag: "zara_confided_offense"
    urgency_start: 0.60
    conditions:
      random_chance: 0.08
      time: ["Evening"]

needs_profile:
  controllo: 0.90
  riconoscimento: 0.75
  sicurezza: 0.70
  connessione: 0.35
  autonomia: 0.65

auto_states:
  - condition: "location == tenda_capo AND time == Morning"
    state: "modalità governativa"
