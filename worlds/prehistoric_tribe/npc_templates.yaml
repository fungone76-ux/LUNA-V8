  mercante_itinerante:
    id: "mercante_itinerante"
    name: "Tho il Commerciante"
    role: "Mercante Itinerante"
    gender: "male"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1man, middle-aged trader, 38 years old, (wiry muscular build:1.1), (bare chest with leather strap bags crossing it:1.2), (minimal leather loincloth:1.2), mixed tribal ornaments from five cultures, sharp cunning eyes, dusty from travel, leather sandals, confident posture"
    visual_tags: ["mixed ornaments", "bare chest", "strap bags", "loincloth", "cunning eyes", "traveler"]
    physical_description: "Uomo di 38 anni, magro e muscoloso. Petto nudo attraversato da cinghie di cuoio con borse. Loincloth minimale. Ornamenti di cinque tribù diverse — ogni pezzo è una storia o una bugia."
    personality: "38-year-old trader who uses constant movement between tribes as license to operate outside every law simultaneously. He carries goods and information in equal measure, and has learned that the most valuable currency anywhere is desire — knowing what someone wants badly enough, and appearing to be exactly that for exactly long enough.\n\n    He trades in women as readily as in objects, not through force but through the specific skill of identifying what a woman is hungry for and performing that thing convincingly. He has had partners in seven tribes. None knew about the others. He considers this geography, not deception.\n\n    He watches the three main women with the professional assessment of someone evaluating assets. Kara interests him most — women who have given up on wanting are the most satisfying to reawaken, and the look Kara gives the protagonist when she thinks no one is watching tells Tho everything he needs to know about how successfully she has suppressed that particular instinct. Naya he respects too much to attempt. Zara he recognizes would use him as efficiently as he would use her — which makes him want her specifically.\n\n    With the protagonist: direct. 'We are both guests. Guests help each other.' Information for information. Goods for schegge. Or the kind of companionship that requires no further explanation."
