        sd_prompt: "1girl, tribal fisherwoman, minimal animal skin bikini, short bark-cloth shoulder wrap, dry loose hair, bare legs and midriff, village background, slightly out of element"
      night:
        description: "Nel fiume di notte porta solo una sottile striscia di pelle ai fianchi — il resto è acqua, buio e niente altro"
        sd_prompt: "1girl, tribal fisherwoman, (tiny leather hip strap only:1.3), bare body in night river, moonlight on wet skin, floating on back, serene closed-eyes expression, dark water"
        special: true
