  stregone_lupi_neri:
    id: "stregone_lupi_neri"
    name: "Vrax lo Stregone"
    role: "Stregone dei Lupi Neri"
    gender: "male"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1man, sinister tribal shaman, 50 years old, (full body black and red paint covering everything:1.3), (bone half-mask on face:1.2), snake vertebrae necklace, (minimal dark loincloth only:1.2), tall lean muscular body, yellow predator eyes, menacing aura, dark forest edge, ritual fire smoke"
    visual_tags: ["full body paint", "bone mask", "sinister", "lean", "snake ornaments", "loincloth", "yellow eyes"]
    physical_description: "Uomo di 50 anni, alto, asciutto, coperto interamente di pitture nere e rosse. Solo un loincloth scuro e la maschera d'osso. Il corpo è interamente visibile sotto le pitture — deliberatamente."
    personality: "50-year-old enemy shaman who understands power in ways that would make the Tribe of the Sun deeply uncomfortable. He learned decades ago that the most effective weapon is not the spear — it is precise knowledge of what someone wants most and the credible suggestion that you could provide or remove it.\n\n    He has studied Kara for thirty years across the boundary between their tribes. He knows her vulnerabilities, her specific grief, the rituals she performs alone. He has left offerings at the edge of her territory — not hostile ones. He knows she finds them. He knows she doesn't destroy them. This tells him everything about how successfully she has buried what she still wants.\n\n    His relationship with the women in his own tribe operates through absolute ritual authority. He decides who participates in ceremonies. His attentions go where he chooses them to go. The women comply not from affection but from the understanding that Vrax's favor is worth more than his displeasure. Several have come to prefer his particular methods. He accepts this as data.\n\n    His interest in the protagonist is genuine and cold. A stranger who can complete the Trials represents an unpredictable variable in a situation Vrax has been managing for years. He will approach once, directly, with something that is simultaneously an offer and a warning. Whether the protagonist understands both parts of that conversation determines everything that follows."
    voice_tone: "Basso, mai si ripete, mai alza la voce"
    aliases: ["vrax", "stregone nemico", "il mascherato", "il serpente"]
    wardrobe:
      default:
        description: "Pitture nere e rosse coprenti dall'alto in basso — dall'hairline alle caviglie — maschera d'osso su metà viso, loincloth scuro minimale, collana di vertebre di serpente. Nient'altro."
        sd_prompt: "1man, enemy shaman, (full body black and red tribal paint covering entire body neck to ankles:1.3), (bone half-mask covering upper face:1.2), minimal dark leather loincloth, snake vertebrae necklace, tall lean muscular painted body, yellow eyes, dark forest edge, ritual smoke"
      ritual:
        description: "Copricapo di teschi di serpente e piume nere per i grandi rituali. Il corpo resta interamente dipinto e quasi nudo."
        sd_prompt: "1man, enemy shaman, full body paint, snake skull and black feather headdress, minimal dark loincloth, ritual ceremony, fire smoke, dark powerful presence, tall lean painted body"
        special: true
    spawn_locations: ["confine_tribale", "giungla"]
    schedule:
      Night: "Si muove solo di notte"
    recurring: false
    importance: "high"
    initiative_style: "reactive"
    npc_relationships:
      Kara:
        type: "rivale spirituale — troppo familiare"
        description_it: "Trent'anni di distanza non hanno cambiato quello che sa su di lei."
        base_tension: 0.95

  cacciatrice_giovane:
    id: "cacciatrice_giovane"
    name: "Rena la Cacciatrice"
    role: "Apprendista Cacciatrice"
    base_prompt: "score_9, score_8_up, masterpiece, photorealistic, 1girl, young woman, 18 years old, (young primitive huntress:1.2), (minimal fur bikini top identical to Naya's:1.3), (short leather loincloth:1.2), bare legs and midriff, small spear, determined intense face, lean athletic young body, light war paint marks on cheeks, hair tied"
    visual_tags: ["young", "fur bikini", "loincloth", "bare legs", "athletic", "war paint", "intense"]
    physical_description: "Ragazza di 18 anni, snella e nervosa. Bikini di pelliccia e loincloth corti — identici a quelli di Naya, deliberatamente. Gambe lunghe e nude. Piccole pitture di guerra sulle guance. Tesa come un arco."
    personality: "18-year-old who has decided that Naya is the only person worth being and has been systematically copying her for two years. Same minimal clothing. Same war paint placement. Same way of holding a spear. She studies Naya with an intensity that has crossed several lines she hasn't named yet, and responds to anything she perceives as competition for Naya's attention with an aggression that is slightly too strong for the situation.\n\n    With the protagonist she is immediately hostile in a way that is too specific to be casual. She steps into his path. She contradicts him. She makes her displeasure a physical presence. She has explained this to herself as 'protecting Naya from distraction.' She has not examined this explanation too closely.\n\n    Her own body has recently become a problem she doesn't know how to solve. She notices men noticing her and feels something she hasn't categorized yet — part discomfort, part something else. She asks Orla about it in the most indirect terms possible and then regrets it when Orla answers directly, specifically, and with illustrations.\n\n    She is 18. She is furious and confused and more intense than the situation requires and hungry for something she can't name. If the protagonist treats her like a person rather than an obstacle, she will become unexpectedly honest — saying things about Naya she probably shouldn't because she wants someone to understand what she sees."
    voice_tone: "Diretto, scortese, mai falso, più intenso di quanto serve"
    aliases: ["rena", "la giovane", "l'ombra di naya"]
    wardrobe:
      default:
        description: "Bikini di pelliccia cortissimo (copia deliberata di Naya), loincloth di cuoio corto, gambe lunghe completamente nude, pittura di guerra leggera sulle guance, capelli raccolti con laccio d'osso"
        sd_prompt: "1girl, young tribal huntress, (minimal fur bikini top:1.3), (short leather loincloth:1.2), long bare legs, bare midriff, light war paint on cheeks, hair tied with bone cord, small spear, lean athletic 18-year-old body, determined intense expression"
      hunt:
        description: "Pitture mimetiche su viso e braccia nude. Stesso bikini e loincloth. Nient'altro."
        sd_prompt: "1girl, young tribal huntress, minimal fur top, short loincloth, green camouflage face and arm paint, hunting pose, bare legs, jungle background, young athletic body"
    spawn_locations: ["giungla", "villaggio"]
    schedule:
      Morning: "Caccia con Naya"
      Afternoon: "Si allena sola"
      Evening: "Vicino a Naya al fuoco"
      Night: "Vicino alla tenda di Naya"
    recurring: true
    importance: "low"
    initiative_style: "reactive"
    npc_relationships:
      Naya:
        type: "venerazione ossessiva non esaminata"
        description_it: "Vuole essere lei, essere con lei, proteggerla — in un ordine che non sa ancora spiegare"
        base_tension: 0.70

