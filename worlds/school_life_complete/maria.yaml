quests:
  
  # --- QUEST 1: La Difesa (Trigger Principale) ---
  maria_defense:
    meta:
      title: "La Difesa"
      description: "Il protagonista difende Maria da uno studente prepotente"
      character: "Maria"
      hidden: false
    
    activation:
      type: "auto"
      conditions:
        - type: "affinity"
          target: "Maria"
          operator: "gte"
          value: 1
    
    stages:
      start:
        title: "Il Confronto"
        narrative_prompt: "Uno studente insulta Maria per avergli fatto cadere i libri. Il protagonista interviene..."
        player_hint: "Difendi Maria dallo studente prepotente"
        exit_conditions:
          - type: "action"
            pattern: "difendi|proteggi|aiuta"
        fail_conditions:
          - type: "flag"
            target: "player_walked_away"
            operator: "eq"
            value: true
        transitions:
          - condition: "default"
            target_stage: "gratitude"

      gratitude:
        title: "La Gratitudine"
        narrative_prompt: "Maria è incredula. Nessuno l'aveva mai difesa. I suoi occhi si riempiono di lacrime di gratitudine."
        player_hint: "Accetta la gratitudine di Maria con gentilezza"
        on_enter:
          - action: "change_affinity"
            character: "Maria"
            value: 15
          - action: "set_flag"
            key: "maria_defended"
            value: true
          - action: "set_emotional_state"
            character: "Maria"
            value: "grateful"
        exit_conditions:
          - type: "turn_count"
            operator: "gte"
            value: 2
        fail_conditions:
          - type: "affinity"
            target: "Maria"
            operator: "lt"
            value: 1
        transitions:
          - condition: "default"
            target_stage: "_complete"
    
    rewards:
      affinity:
        Maria: 20
      flags:
        maria_defended: true
  
