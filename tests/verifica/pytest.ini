# pytest.ini - Configurazione pytest per Luna RPG v8

[pytest]
# Async support
asyncio_mode = auto

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers personalizzati
markers =
    slow: test lenti (E2E, >5s)
    benchmark: test performance
    integration: test di integrazione
    unit: test unitari
    poker: test sistema poker
    npc: test NPCMind
    persistence: test salvataggio/caricamento
    requires_llm: test che richiedono API key LLM valida

# Output verboso
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Coverage options
# --cov=src/luna
# --cov-report=html
# --cov-report=term-missing

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/logs/pytest.log
log_file_level = DEBUG

# Timeout per test (previene hang)
timeout = 30

# Parallelo (opzionale, richiede pytest-xdist)
# addopts = -n auto
