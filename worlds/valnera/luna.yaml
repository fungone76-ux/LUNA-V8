quests:
  luna_poisoned_chalice:
    meta:
      title: Il Calice
      description: Luna offre del vino. È leggermente drogato — non per far male,
        per testare. Il Cacciatore nota qualcosa di strano?
      character: Luna
      hidden: false
    activation:
      type: auto
      conditions:
      - type: affinity
        target: Luna
        operator: gte
        value: 1
    stages:
      il_calice:
        title: Il Calice
        companion_situation: Luna is testing the player. She has added a mild truth-serum
          herb to the wine — not enough to harm, enough to loosen the tongue. She
          watches his reaction with clinical precision, hiding her intense curiosity
          behind perfect composure. She needs to know if he can be read.
        narrative_prompt: '''Un vino locale,'' dice Luna, posando il calice sul bancone
          con gesto preciso. ''Per i nuovi arrivati.'' I suoi occhi ti studiano come
          una formula che non torna. Il vino ha un colore leggermente più scuro del
          normale. Potrebbe essere niente. Potrebbe non esserlo.'
        exit_conditions:
        - type: action
          pattern: bevo|accetto|grazie|rifiuto|no|fiuto|odoro|assaggio
        transitions:
        - condition: default
          target_stage: il_test
      il_test:
        title: Il Test
        companion_situation: Luna has her answer. Whether the player drank or refused,
          she learned something essential about him. She files it away with cold precision.
          But there is a flicker of something — not warmth exactly, but interest.
          He is not what she expected.
        narrative_prompt: Luna studia la tua reazione con occhi che non lasciano trasparire
          niente. Poi, lentamente, le labbra si curvano in qualcosa che non è esattamente
          un sorriso. 'Interessante,' dice. Una parola sola. Non aggiunge altro.
        on_enter:
        - action: change_affinity
          character: Luna
          value: 10
        - action: set_flag
          key: luna_chalice_test_done
          value: true
        exit_conditions:
        - type: turn_count
          operator: gte
          value: 1
        transitions:
        - condition: default
