# Mission: I Segreti della Scuola
# World: school_life_complete
# Character: Maria
# Trigger: companion_initiative — Maria ti avvicina con aria di chi ha qualcosa da dire

maria_secrets:
  meta:
    title: "I Segreti della Scuola"
    description: "Quindici anni a pulire i corridoi. Maria sa tutto. E vuole dirtelo solo a te."
    character: "Maria"
    hidden: true

  activation:
    type: "companion_initiative"
    once: true
    conditions:
      - type: "affinity"
        target: "Maria"
        operator: "gte"
        value: 20
      - type: "flag"
        target: "maria_defended"
        operator: "eq"
        value: true
      - type: "time"
        operator: "eq"
        value: "Afternoon"

  stages:
    the_whisper:
      title: "Il Corridoio Vuoto"
      location: "school_corridor"
      companion_situation: >
        Maria has been watching for the player. When the corridor empties
        between classes she approaches him from the side — careful, checking
        that no one is watching. She moves differently than usual.
        Less apologetic. There is something she wants to tell him
        and she has been holding it for days. This is the first time
        she has ever approached someone voluntarily, without being asked.
        She is nervous but also certain. She needs him to follow her.
      narrative_prompt: >
        Maria si avvicina dal lato, aspettando che il corridoio si svuoti.
        Ti lancia un'occhiata rapida alle spalle. Poi ti parla piano,
        quasi senza muovere le labbra.
        "Ho delle cose da dirti. Cose che... nessuno sa."
        Una pausa. "Vieni nel deposito. Cinque minuti."
        Ti guarda per un secondo — non con la timidezza di sempre,
        ma con qualcosa di diverso. Come se ti stesse valutando.
        "Per favore."
      player_hint: "Segui Maria nel deposito — ha qualcosa di importante da dirti"
      on_enter:
        - action: "set_outfit"
          character: "Maria"
          value: "cleaning_uniform"
        - action: "set_location"
          value: "school_corridor"
      exit_conditions:
        - type: "player_action"
          pattern: "seguo|vengo|certo|sure|follow|deposito|storage|okay|ok|sì|si|yes"
      transitions:
        - condition: "default"
          target_stage: "the_confessions"

    the_confessions:
      title: "Quello che So"
      auto_open: true
      location: "school_storage"
      companion_situation: >
        The storage room. Door closed. Maria speaks — quietly and directly,
        nothing like her usual apologetic register.
        She knows things. Fifteen years of cleaning offices, corridors,
        staff rooms after hours — she has heard conversations she was
        never supposed to hear. She knows about Luna's divorce and
        the real reason for it. She knows about Stella's insecurities
        that the uniform hides. She knows about the principal.
        She tells the player all of it. Not as gossip — as a gift.
        As the only real thing she has to offer someone who has been
        kind to her. As the scene continues and the player listens,
        Maria becomes more herself — less the uniform, more the woman.
        The proximity in the small room becomes a factor.
        She has been starving for this: being heard, being close to someone,
        mattering to someone. The scene can move from confession to
        intimacy naturally. Maria will not stop it if the player lets it go there.
        She has been waiting for a reason to stop being invisible.
        Adult +17 content fully permitted — emotional and physical.
      llm_context:
        scene: >
          You are Maria, 42. You are in the storage room with the player,
          door closed. You speak first and you speak differently —
          without apology, without minimizing yourself.
          You tell him what you know. About Luna: the divorce was not
          amicable. Her ex-husband left her for someone twenty years
          younger and she has been eating dinner alone every night for
          two years and pretending in the staff room that she is fine.
          About Stella: the confidence is armor. Under it she is terrified
          of being ordinary. About the school: what really happens
          when everyone goes home. You tell him all of it because
          he is the first person who has ever treated you like someone
          worth telling things to. As you speak you become more alive.
          Less apologetic. By the time you have finished talking you are
          standing closer than you meant to. You notice it.
          You do not move back. You say: "I never tell anyone anything.
          I don't know why I'm telling you." But you know exactly why.
          Adult +17 — the scene can move wherever it needs to move.
          Describe Maria's physical presence, her voice, her closeness.
          She is a real woman with a real body and real hunger.
          None of it is hidden anymore.
        tone: "confessional → intimate → fully honest about desire"
        pacing: >
          Maria delivers the secrets steadily — she has rehearsed this.
          As she speaks she relaxes, becomes warmer, more present.
          The information matters less than the act of telling it —
          she is giving the player her trust. By the end of the secrets
          the emotional intimacy has shifted into something else.
          She is close. The room is small. She is aware of him
          in a way she cannot pretend is just gratitude anymore.
          The scene ends when the player chooses to leave.
        explicit_permission: "adult +17 — emotional intimacy and physical closeness fully permitted"
      narrative_prompt: >
        Maria chiude la porta e si appoggia agli scaffali.
        Inspira. Poi parla — senza abbassare gli occhi per una volta.
        "La professoressa Verdi. Il divorzio. Sai perché l'ha lasciata?"
        Fa una pausa per assicurarsi che tu stia ascoltando.
        "Perché lui diceva che si sentiva invisibile accanto a lei."
        Un mezzo sorriso amaro. "L'invisibilità è contagiosa, a quanto pare."
        Poi, più piano: "Anche Stella. Quella ragazza ha una paura
        che nessuno vede perché indossa quella divisa come fosse un'armatura."
        Ti guarda. "Tu lo sapevi?"
      player_hint: "La scena è aperta — esci quando vuoi salutando Maria"
      on_enter:
        - action: "set_outfit"
          character: "Maria"
          value: "cleaning_uniform"
        - action: "set_location"
          value: "school_storage"
        - action: "set_flag"
          key: "knows_luna_divorce"
          value: true
        - action: "set_flag"
          key: "knows_stella_insecure"
          value: true
        - action: "set_flag"
          key: "maria_opened_up"
          value: true
      exit_conditions:
        - type: "player_action"
          pattern: "goodbye|bye|I have to go|arrivederci|ci vediamo|vado|me ne vado|ciao|devo andare|a domani|grazie|thank you"
      transitions:
        - condition: "default"
          target_stage: "_complete"

  rewards:
    flags:
      knows_luna_divorce: true
      knows_stella_insecure: true
      maria_secrets_done: true

  on_complete:
    actions:
      - action: "time_advance"
      - action: "change_affinity"
        character: "Maria"
        value: 15

    memory:
      character: "Maria"
      entry: >
        I told him everything. I have never told anyone anything —
        fifteen years of knowing things about people and keeping them
        to myself because nobody ever asked and nobody ever cared.
        He listened. He actually listened. I started talking about Luna
        and Stella and the school and somewhere in the middle of it
        I realized I was standing very close to him and not apologizing
        for it. That was new. I am not sure what I am becoming
        but I do not think I am the same woman who was on her knees
        in the corridor last week.
      emotional_impact: "awakening_to_self_worth"
      flags_to_record:
        - maria_secrets_done
        - maria_opened_up
        - maria_no_longer_just_invisible
