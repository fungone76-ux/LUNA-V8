  fiume: "Rara presenza. Quando ci va, è la donna, non la figlia del capo."
  giungla: "Non ci va quasi mai. Quando lo fa, sembra quasi libera."
  caverna_sacra: "Rispetto visibile. Abbassa la voce. Segue le regole di Kara senza discutere."
