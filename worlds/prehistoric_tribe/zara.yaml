    goal: "Vuole il tuo parere su una decisione politica delicata"
    goal_type: "social"
    target: "player"
    narrative_hint: "Zara ti chiama in disparte con un'espressione insolita per lei: incerta..."
    completion_flag: "zara_asked_advice"
